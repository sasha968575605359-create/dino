<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>CyberDino: The Menu Edition</title>
    <style>
        body {
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: #050505;
            color: #00ffcc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            user-select: none;
        }

        #game-container {
            position: relative;
            width: 800px;
            height: 300px;
        }

        canvas {
            display: block;
            background: linear-gradient(to bottom, #0a0a12, #111122);
            border: 2px solid #00ffcc;
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.2);
            border-radius: 8px;
        }

        /* Стиль Меню */
        #menu-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            border-radius: 8px;
            transition: opacity 0.3s;
        }

        h1 {
            font-size: 3rem;
            margin: 0 0 20px 0;
            text-shadow: 0 0 15px #00ffcc;
            letter-spacing: 5px;
        }

        .difficulty-box {
            margin-bottom: 25px;
            display: flex;
            gap: 10px;
        }

        .diff-btn {
            background: transparent;
            border: 1px solid #00ffcc;
            color: #00ffcc;
            padding: 8px 15px;
            cursor: pointer;
            transition: 0.2s;
            font-weight: bold;
            text-transform: uppercase;
        }

        .diff-btn.active {
            background: #00ffcc;
            color: #000;
            box-shadow: 0 0 15px #00ffcc;
        }

        .diff-btn:hover:not(.active) {
            background: rgba(0, 255, 204, 0.2);
        }

        #start-btn {
            background: #ff0055;
            color: white;
            border: none;
            padding: 15px 50px;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 0 20px #ff0055;
            transition: 0.2s;
        }

        #start-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px #ff0055;
        }

        .best-score-ui {
            margin-top: 15px;
            font-size: 1rem;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="menu-overlay">
            <h1>CYBER DINO</h1>
            
            <div class="difficulty-box" id="diff-container">
                <button class="diff-btn" data-level="easy">Легко</button>
                <button class="diff-btn active" data-level="normal">Норм</button>
                <button class="diff-btn" data-level="hard">Сложно</button>
                <button class="diff-btn" data-level="extreme">Экстрим</button>
                <button class="diff-btn" data-level="impossible">АД</button>
            </div>

            <button id="start-btn">В БОЙ</button>
            
            <div class="best-score-ui">РЕКОРД: <span id="best-score-display">0</span></div>
        </div>

        <canvas id="gameCanvas" width="800" height="300"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const menuOverlay = document.getElementById('menu-overlay');
        const startBtn = document.getElementById('start-btn');
        const bestDisplay = document.getElementById('best-score-display');
        const diffButtons = document.querySelectorAll('.diff-btn');

        // Настройки сложности
        const diffSettings = {
            easy: { speed: 6, gap: 110 },
            normal: { speed: 9, gap: 80 },
            hard: { speed: 13, gap: 55 },
            extreme: { speed: 19, gap: 35 },
            impossible: { speed: 28, gap: 20 }
        };

        let currentDiff = 'normal';
        let score = 0;
        let bestScore = localStorage.getItem('dinoBestScoreV3') || 0;
        bestDisplay.textContent = bestScore;

        let gameActive = false;
        let groundY = canvas.height - 30;

        // Игрок
        let dino = { 
            x: 60, y: 0, w: 45, h: 50, 
            dy: 0, jumpForce: 17, gravity: 1.3, grounded: false 
        };

        let obstacles = [];
        let frame = 0;

        // Выбор сложности
        diffButtons.forEach(btn => {
            btn.onclick = () => {
                diffButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentDiff = btn.dataset.level;
            };
        });

        // Старт игры
        startBtn.onclick = () => {
            menuOverlay.style.opacity = '0';
            setTimeout(() => {
                menuOverlay.style.display = 'none';
                resetGame();
            }, 300);
        };

        function resetGame() {
            score = 0;
            obstacles = [];
            gameActive = true;
            dino.y = groundY - dino.h;
            dino.dy = 0;
            loop();
        }

        function drawDino(x, y) {
            ctx.fillStyle = '#00ffcc';
            ctx.shadowBlur = 15; ctx.shadowColor = '#00ffcc';
            ctx.fillRect(x + 10, y + 10, 25, 25); // Тело
            ctx.fillRect(x + 25, y, 15, 15);     // Голова
            ctx.fillRect(x + 35, y + 5, 12, 8);  // Морда
            ctx.fillStyle = '#000';
            ctx.fillRect(x + 32, y + 3, 3, 3);   // Глаз
            ctx.fillStyle = '#00ffcc';
            ctx.fillRect(x + 15, y + 35, 7, 15); // Нога 1
            ctx.fillRect(x + 28, y + 35, 7, 15); // Нога 2
            ctx.shadowBlur = 0;
        }

        function drawObstacle(x, y, w, h) {
            ctx.fillStyle = '#ff0055';
            ctx.shadowBlur = 15; ctx.shadowColor = '#ff0055';
            ctx.fillRect(x, y, w, h);
            ctx.shadowBlur = 0;
        }

        window.addEventListener('keydown', (e) => {
            if ((e.code === 'Space' || e.code === 'ArrowUp') && dino.grounded && gameActive) {
                dino.dy = -dino.jumpForce;
                dino.grounded = false;
            }
        });

        function loop() {
            if (!gameActive) return;

            const mode = diffSettings[currentDiff];
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Земля
            ctx.fillStyle = '#333';
            ctx.fillRect(0, groundY, canvas.width, 2);

            // Физика
            dino.dy += dino.gravity;
            dino.y += dino.dy;
            if (dino.y + dino.h > groundY) {
                dino.y = groundY - dino.h;
                dino.dy = 0;
                dino.grounded = true;
            }

            drawDino(dino.x, dino.y);

            // Препятствия
            if (frame % mode.gap === 0) {
                obstacles.push({ x: canvas.width, w: 25, h: 30 + Math.random() * 45 });
            }

            for (let i = obstacles.length - 1; i >= 0; i--) {
                let o = obstacles[i];
                o.x -= mode.speed;
                drawObstacle(o.x, groundY - o.h, o.w, o.h);

                // Столкновение
                if (dino.x + 5 < o.x + o.w && dino.x + dino.w - 5 > o.x && 
                    dino.y + 5 < groundY && dino.y + dino.h > groundY - o.h) {
                    gameOver();
                }
                if (o.x + o.w < 0) obstacles.splice(i, 1);
            }

            // Счет
            score++;
            ctx.fillStyle = "#fff";
            ctx.font = "20px Arial";
            ctx.textAlign = "left";
            ctx.fillText(`СЧЕТ: ${score}`, 20, 40);

            frame++;
            requestAnimationFrame(loop);
        }

        function gameOver() {
            gameActive = false;
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('dinoBestScoreV3', bestScore);
                bestDisplay.textContent = bestScore;
            }
            
            // Возвращаем меню
            setTimeout(() => {
                menuOverlay.style.display = 'flex';
                menuOverlay.style.opacity = '1';
                document.querySelector('h1').textContent = "ТЫ ПРОЕБАЛ";
                document.querySelector('h1').style.color = "#ff0055";
                document.querySelector('h1').style.textShadow = "0 0 15px #ff0055";
                startBtn.textContent = "ПОПРОБОВАТЬ СНОВА";
            }, 500);
        }
    </script>
</body>
</html>
